<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TinyFish Agent OS</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100%; height: 100vh;
      background: #030712; color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #0d1628;
      background: #030712; flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .logo-name { font-weight: 800; font-size: 15px; letter-spacing: -0.03em; }
    .logo-sub { font-size: 9px; color: #334155; text-transform: uppercase; letter-spacing: 0.1em; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.6)} }
    #statusText { font-size: 10px; color: #334155; }

    /* ── Agent tabs ── */
    .agent-tabs {
      display: flex; gap: 0; border-bottom: 1px solid #0d1628;
      flex-shrink: 0; overflow-x: auto;
    }
    .agent-tabs::-webkit-scrollbar { height: 2px; }
    .agent-tabs::-webkit-scrollbar-thumb { background: #1e293b; }
    .agent-tab {
      flex: 1; min-width: 60px; padding: 10px 6px;
      border: none; border-bottom: 2px solid transparent;
      background: transparent; color: #334155;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; text-align: center; white-space: nowrap;
    }
    .agent-tab.active { color: var(--c); border-bottom-color: var(--c); background: color-mix(in srgb, var(--c) 6%, transparent); }
    .agent-tab:hover:not(.active) { color: #64748b; background: #06080f; }

    /* ── Scrollable content ── */
    .content {
      flex: 1; overflow-y: auto; padding: 14px;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    /* ── Form fields ── */
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 9px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
    input, textarea, select {
      width: 100%; background: #06080f; border: 1px solid #0d1628;
      border-radius: 8px; padding: 9px 12px;
      font-size: 13px; color: #94a3b8; outline: none;
      font-family: inherit; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #f59e0b; box-shadow: 0 0 0 2px #f59e0b14; }
    textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

    /* ── Run button ── */
    #runBtn {
      width: 100%; padding: 12px; border-radius: 9px; border: none;
      color: #000; font-size: 14px; font-weight: 800;
      cursor: pointer; transition: all 0.18s;
      margin-bottom: 12px; letter-spacing: 0.02em;
    }
    #runBtn:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    #runBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Log ── */
    .log-wrap { margin-bottom: 10px; }
    .log-label { font-size: 9px; font-weight: 700; color: #1e293b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
    #logArea {
      background: #020408; border: 1px solid #0d1628; border-radius: 8px;
      padding: 10px 12px; height: 180px; overflow-y: auto;
      font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.8;
    }
    #logArea::-webkit-scrollbar { width: 2px; }
    #logArea::-webkit-scrollbar-thumb { background: #1e293b; }
    .l-empty { color: #1e293b; }
    .l-nav { color: #06b6d4; }
    .l-action { color: #f59e0b; }
    .l-complete { color: #10b981; }
    .l-error { color: #f87171; }

    /* ── Results ── */
    #resultArea { display: none; }

    /* ── Flight cards ── */
    .result-header { font-size: 11px; font-weight: 700; color: var(--agent-color, #3b82f6); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .flight-card {
      background: #0a0f1c; border: 1px solid #1e293b; border-radius: 9px;
      padding: 11px 13px; margin-bottom: 7px; cursor: pointer; transition: all 0.15s;
    }
    .flight-card:hover { border-color: #3b82f644; }
    .flight-card.sel { border-color: #3b82f6; background: #3b82f60e; border-left: 3px solid #3b82f6; }
    .fc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .fc-airline { font-size: 13px; font-weight: 700; color: #cbd5e1; }
    .fc-price { font-size: 16px; font-weight: 800; color: #3b82f6; }
    .fc-meta { font-size: 11px; color: #475569; }
    .fc-tags { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
    .fc-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .tag-cheapest { background: #3b82f622; color: #3b82f6; }
    .tag-nonstop { background: #10b98122; color: #10b981; }
    .tag-stop { background: #f59e0b22; color: #f59e0b; }
    .tag-source { background: #1e293b; color: #475569; }

    #bookBtn {
      width: 100%; padding: 12px; border-radius: 9px; border: none;
      background: linear-gradient(135deg, #3b82f6, #3b82f6bb);
      color: #000; font-size: 13px; font-weight: 800; cursor: pointer;
      margin-top: 6px; margin-bottom: 10px; display: none;
      transition: all 0.18s;
    }
    #bookBtn:hover { filter: brightness(1.1); transform: translateY(-1px); }

    /* ── Price comparison ── */
    .price-compare { background: #0a0f1c; border: 1px solid #1e293b; border-radius: 9px; overflow: hidden; margin-bottom: 10px; }
    .price-compare-header { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; padding: 8px 12px 5px; letter-spacing: 0.1em; }
    .price-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 12px; border-top: 1px solid #080d18; }
    .price-row.best { background: #3b82f608; }
    .price-site { font-size: 12px; color: #94a3b8; }
    .price-val { font-size: 13px; font-weight: 700; color: #3b82f6; }
    .best-badge { font-size: 9px; padding: 2px 6px; border-radius: 10px; background: #3b82f622; color: #3b82f6; }

    /* ── Promo codes ── */
    .promos { margin-bottom: 10px; }
    .promos-label { font-size: 10px; font-weight: 700; color: #f59e0b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .promo-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .promo-tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: #f59e0b18; color: #f59e0b; border: 1px solid #f59e0b33; font-family: 'Courier New', monospace; cursor: pointer; }
    .promo-tag:hover { background: #f59e0b28; }

    /* ── Hotels ── */
    .hotel-card { background: #0a0f1c; border: 1px solid #1e293b; border-radius: 9px; padding: 10px 13px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; }
    .hotel-name { font-size: 12px; font-weight: 600; color: #cbd5e1; }
    .hotel-meta { font-size: 10px; color: #334155; margin-top: 2px; }
    .hotel-price { font-size: 13px; font-weight: 700; color: #3b82f6; flex-shrink: 0; margin-left: 10px; }

    /* ── SDR ── */
    .sdr-company { font-size: 16px; font-weight: 800; color: #06b6d4; margin-bottom: 3px; }
    .sdr-industry { font-size: 11px; color: #334155; margin-bottom: 10px; }
    .tech-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .tech-tag { font-size: 10px; padding: 3px 9px; border-radius: 10px; background: #06b6d418; color: #06b6d4; border: 1px solid #06b6d433; }
    .execs { font-size: 11px; color: #475569; margin-bottom: 10px; }
    .email-box { background: #06b6d408; border: 1px solid #06b6d422; border-radius: 9px; padding: 12px; }
    .email-label { font-size: 9px; font-weight: 700; color: #06b6d4; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .email-tabs { display: flex; gap: 5px; margin-bottom: 8px; }
    .email-tab { padding: 3px 10px; border-radius: 4px; border: 1px solid #1e293b; background: transparent; color: #334155; font-size: 10px; cursor: pointer; }
    .email-tab.active { background: #0f172a; color: #e2e8f0; border-color: #334155; }
    .email-subject { font-size: 11px; font-weight: 600; color: #cbd5e1; margin-bottom: 5px; }
    .email-body { font-size: 11px; color: #64748b; line-height: 1.7; white-space: pre-wrap; }
    #copyEmailBtn { width: 100%; margin-top: 8px; padding: 8px; border-radius: 6px; border: 1px solid #06b6d433; background: #06b6d411; color: #06b6d4; font-size: 11px; cursor: pointer; font-weight: 600; }

    /* ── Jobs ── */
    .job-card { background: #0a0f1c; border: 1px solid #1e293b; border-radius: 9px; padding: 10px 13px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: flex-start; }
    .job-title { font-size: 12px; font-weight: 600; color: #cbd5e1; margin-bottom: 3px; }
    .job-meta { font-size: 10px; color: #334155; }
    .apply-link { font-size: 10px; padding: 4px 10px; border-radius: 5px; background: #f43f5e22; color: #f43f5e; border: 1px solid #f43f5e33; text-decoration: none; font-weight: 700; flex-shrink: 0; margin-left: 8px; white-space: nowrap; }

    /* ── Compliance ── */
    .risk-item { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid #080d18; }
    .risk-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
    .risk-high { background: #ef444422; color: #f87171; border: 1px solid #ef444433; }
    .risk-medium { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b33; }
    .risk-low { background: #10b98122; color: #34d399; border: 1px solid #10b98133; }
    .risk-text { font-size: 11px; color: #cbd5e1; font-weight: 500; }
    .risk-action { font-size: 10px; color: #475569; margin-top: 2px; }

    /* ── Divider ── */
    .section-title { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin: 12px 0 7px; padding-bottom: 5px; border-bottom: 1px solid #0d1628; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🐟</div>
      <div>
        <div class="logo-name">TinyFish Agent OS</div>
        <div class="logo-sub">Web Intelligence Platform</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-dot"></div>
      <span id="statusText">Ready</span>
    </div>
  </div>

  <!-- Agent tabs -->
  <div class="agent-tabs" id="agentTabs"></div>

  <!-- Scrollable content -->
  <div class="content">
    <div id="formArea"></div>
    <button id="runBtn">▶ Launch Agent</button>
    <div class="log-wrap">
      <div class="log-label">Live Agent Log</div>
      <div id="logArea"><span class="l-empty">// Agent standing by...</span></div>
    </div>
    <div id="resultArea"></div>
    <button id="bookBtn">🎫 Book Selected Flight</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
